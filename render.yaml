services:
  - type: web
    name: brs-autoatelier          # будет поддоменом <name>.onrender.com
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        fromSecret: SECRET_KEY      # создайте секрет в панели Render
      - key: FLASK_ENV
        value: production
